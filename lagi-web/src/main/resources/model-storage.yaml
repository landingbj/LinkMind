# ============================================
# 模型与数据集存储配置
# 支持环境变量注入，便于容器化部署
# ============================================

storage:
  # 基础存储路径（支持环境变量 ${STORAGE_BASE_PATH}）
  base_path: ${STORAGE_BASE_PATH:/app/data}
  
  # 模型存储路径
  models: ${STORAGE_BASE_PATH:/app/data}/models
  
  # 数据集存储路径
  datasets: ${STORAGE_BASE_PATH:/app/data}/datasets
  
  # 训练输出路径
  training_output: ${STORAGE_BASE_PATH:/app/data}/training_output
  
  # 训练项目路径
  project: ${STORAGE_BASE_PATH:/app/data}/project

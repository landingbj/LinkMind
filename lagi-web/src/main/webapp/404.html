<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        .error-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #444;
        }

        .error-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 35px;
            background-color: #0066cc;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background-color: #0052aa;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }
            .error-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-title">抱歉，您访问的页面不存在</div>
        <div class="error-desc">
            页面可能已被移动、修改或暂时不可用<br>
            请检查链接是否正确，或返回首页重新操作
        </div>
    </div>
</body>
</html>
